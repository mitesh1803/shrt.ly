<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>shrt.ly Extension Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <p class="eyebrow">shrt.ly</p>
        <h1>Extension Settings</h1>
        <p class="copy">Point the extension at your backend. The popup will use this base URL for login and link shortening.</p>

        <form id="settingsForm" class="form">
          <label class="label" for="apiBaseUrlInput">API base URL</label>
          <input id="apiBaseUrlInput" class="field" type="url" placeholder="http://localhost:3000" />
          <button class="button" type="submit">Save settings</button>
        </form>

        <p id="statusMessage" class="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="options.js"></script>
  </body>
</html>
